<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 64" width="320" height="64" role="img" aria-label="EASYMIX — NanoCem UT-9">
  <style>
    .ink   { fill: #1A1C1A; }
    .acc   { fill: #6E7F6A; }
    .mut   { fill: #8A8F88; }
    .wm    { font-family: 'Space Grotesk', 'Segoe UI', system-ui, sans-serif; font-weight: 700; letter-spacing: .14em; }
    .sub   { font-family: 'JetBrains Mono', ui-monospace, monospace; font-weight: 500; letter-spacing: .12em; }
    .dstroke { fill: none; stroke: #1A1C1A; stroke-width: 2.4; }
    .dstroke-acc { fill: none; stroke: #6E7F6A; stroke-width: 2.4; }
  </style>

  <!-- Diamond mark -->
  <g transform="translate(32 32)">
    <rect class="dstroke" x="-18" y="-18" width="36" height="36" transform="rotate(45)"/>
    <rect class="dstroke-acc" x="-9" y="-9" width="18" height="18" transform="rotate(45)"/>
    <line x1="0" y1="-6" x2="0" y2="6" stroke="#6E7F6A" stroke-width="2.4"/>
  </g>

  <!-- Wordmark -->
  <text class="wm ink" x="68" y="30" font-size="22">EASYMIX</text>
  <text class="sub mut" x="69" y="48" font-size="11">NanoCem UT-9</text>
</svg>
