<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 360" width="560" height="360" role="img" aria-label="Скважина 301: выход на 14,3 т/сут при 27,7 процента в течение трёх суток после запуска">
  <style>
    .ttl  { font-family:'Space Grotesk','Segoe UI',sans-serif; font-weight:700; fill:#1A1C1A; font-size:20px; }
    .lbl  { font-family:'JetBrains Mono',ui-monospace,monospace; fill:#8A8F88; font-size:11px; letter-spacing:.04em; }
    .key  { font-family:'JetBrains Mono',ui-monospace,monospace; font-size:11px; letter-spacing:.04em; }
    .grid { stroke:#D6D9D3; stroke-width:1; }
    .axis { stroke:#1A1C1A; stroke-width:1.4; }
    .deb  { fill:none; stroke:#6E7F6A; stroke-width:3; stroke-linecap:round; stroke-linejoin:round;
            stroke-dasharray:900; stroke-dashoffset:900; animation:draw 1.6s ease-out .3s forwards; }
    .wc   { fill:none; stroke:#8A8F88; stroke-width:2; stroke-dasharray:5 5; stroke-linecap:round;
            animation:wcdraw 1.6s ease-out .3s forwards; opacity:0; }
    .pt   { opacity:0; animation:show .4s ease-out 1.7s forwards; }
    @keyframes draw   { to { stroke-dashoffset:0; } }
    @keyframes wcdraw { from{opacity:0;} to{opacity:1;} }
    @keyframes show   { to { opacity:1; } }
    @media (prefers-reduced-motion: reduce){
      .deb{animation:none;stroke-dashoffset:0;} .wc{animation:none;opacity:1;} .pt{animation:none;opacity:1;}
    }
  </style>

  <text class="ttl" x="20" y="34">Скважина 301</text>
  <text class="lbl" x="20" y="52">после КРС/ТРС · выход на режим за 3 суток</text>

  <line class="grid" x1="70" y1="50"  x2="500" y2="50"/>
  <line class="grid" x1="70" y1="160" x2="500" y2="160"/>
  <line class="axis" x1="70" y1="270" x2="500" y2="270"/>
  <line class="axis" x1="70" y1="50"  x2="70"  y2="270"/>
  <text class="lbl" x="38" y="54">20</text>
  <text class="lbl" x="38" y="164">10</text>
  <text class="lbl" x="48" y="274">0</text>

  <polyline class="wc" points="70,204 180,208 285,209 395,209 500,209"/>
  <polyline class="deb" points="70,248 180,171 285,113 395,116 500,113"/>

  <g class="pt">
    <circle cx="285" cy="113" r="4.5" fill="#6E7F6A"/>
    <text class="key" x="292" y="107" fill="#1A1C1A">14,3 т/сут · 27,7%</text>
  </g>

  <g transform="translate(70 326)">
    <line x1="0" y1="-4" x2="22" y2="-4" stroke="#6E7F6A" stroke-width="3"/>
    <text class="key" x="28" y="0" fill="#1A1C1A">дебит, т/сут</text>
    <line x1="180" y1="-4" x2="202" y2="-4" stroke="#8A8F88" stroke-width="2" stroke-dasharray="5 5"/>
    <text class="key" x="208" y="0" fill="#8A8F88">обводнённость, %</text>
  </g>
</svg>
